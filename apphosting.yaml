      - RUNTIME

  - variable: HELIUS_API_KEY
    secret: goonclaw-helius-api-key
    availability:
      - RUNTIME

  - variable: BIRDEYE_API_KEY
    secret: goonclaw-birdeye-api-key
    availability:
      - RUNTIME

  - variable: PUBLIC_AUTOBLOW_DEVICE_TOKEN
