      - RUNTIME

  - variable: DEVICE_CREDENTIALS_AES_KEY
    secret: goonclaw-device-credentials-aes-key
    availability:
      - RUNTIME

  - variable: ACCESS_CNFT_AUTHORITY_SECRET
    secret: goonclaw-cnft-authority-secret
